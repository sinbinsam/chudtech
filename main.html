const CURSOR_REPEL_STRENGTH = 135;

/*
   How much particles move forward in Z when repelled.
*/
const CURSOR_Z_LIFT = 65;

/*
   Whole object nudge.
   Keep this tiny if you only want a couple pixels.
*/
const OBJECT_AVOID_STRENGTH = 2.5;

/*
   Slow floating motion.
*/
const FLOAT_AMOUNT_XY = 2.8;
const FLOAT_AMOUNT_Z = 7.5;
const FLOAT_SPEED = 0.45;

/*
   Very subtle parallax rotation.
*/
const ROTATION_STRENGTH_X = 0.055;
const ROTATION_STRENGTH_Y = 0.085;

/* ============================================================
   VALIDATION
   ============================================================ */

if (positions.length === 0) {
    console.warn("No position data found. Paste your generated positions array.");
}

if (positions.length % 3 !== 0) {
    console.warn("positions array length should be divisible by 3.");
}

if (colors.length > 0 && colors.length !== positions.length) {
    console.warn("colors array should contain the same number of values as positions.");
}

/* ============================================================
   THREE.JS SETUP
   ============================================================ */

const scene =
    new THREE.Scene();

const camera =
    new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        1,
        5000
    );

camera.position.z = 850;

const renderer =
    new THREE.WebGLRenderer({
        antialias: true,
        alpha: true
    });

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.setPixelRatio(
    Math.min(window.devicePixelRatio, 2)
);

document.body.appendChild(
    renderer.domElement
);

/* ============================================================
   PARTICLE DATA SETUP
   ============================================================ */

const particleCount =
    positions.length / 3;

const currentPositions =
    new Float32Array(positions);

const originalPositions =
    new Float32Array(positions);

const particleColors =
    new Float32Array(positions.length);

const alphas =
    new Float32Array(particleCount);

/*
   Setup colors and alpha.
*/
for (let i = 0; i < particleCount; i++) {

    const i3 = i * 3;

    if (colors.length === positions.length) {

        particleColors[i3] =
            colors[i3];

        particleColors[i3 + 1] =
            colors[i3 + 1];

        particleColors[i3 + 2] =
            colors[i3 + 2];

    } else {

        /*
           Default color if no color data is pasted.
           Soft cool white.
        */
        particleColors[i3] = 0.92;
        particleColors[i3 + 1] = 0.95;
        particleColors[i3 + 2] = 1.0;
    }

    alphas[i] = 1;
}

/* ============================================================
   GEOMETRY
   ============================================================ */

const geometry =
    new THREE.BufferGeometry();

geometry.setAttribute(
    "position",
    new THREE.BufferAttribute(
        currentPositions,
        3
    )
);

geometry.setAttribute(
    "color",
    new THREE.BufferAttribute(
        particleColors,
        3
    )
);

geometry.setAttribute(
    "alpha",
    new THREE.BufferAttribute(
        alphas,
        1
    )
);

/* ============================================================
   SOFT CIRCULAR PARTICLE SHADER
   ============================================================ */

const material =
    new THREE.ShaderMaterial({

        transparent: true,
        depthWrite: false,
        vertexColors: true,

        uniforms: {
            pointSize: {
                value: POINT_SIZE
            }
        },

        vertexShader: `

            attribute float alpha;

            varying vec3 vColor;
            varying float vAlpha;

            uniform float pointSize;

            void main() {

                vColor = color;
                vAlpha = alpha;

                vec4 mvPosition =
                    modelViewMatrix * vec4(position, 1.0);

                gl_PointSize =
                    pointSize * (600.0 / -mvPosition.z);

                gl_Position =
                    projectionMatrix * mvPosition;
            }
        `,

        fragmentShader: `

            varying vec3 vColor;
            varying float vAlpha;

            void main() {

                vec2 coord =
                    gl_PointCoord - vec2(0.5);

                float dist =
                    length(coord);

                if (dist > 0.5) {
                    discard;
                }

                float softEdge =
                    smoothstep(0.5, 0.05, dist);

                gl_FragColor =
                    vec4(vColor, vAlpha * softEdge);
            }
        `
    });

const particles =
    new THREE.Points(
        geometry,
        material
    );

scene.add(
    particles
);

/* ============================================================
   MOUSE TRACKING
   No delay — cursor response is immediate.
   ============================================================ */

const mouseNDC =
    new THREE.Vector2();

const mouseWorld =
    new THREE.Vector3();

let mouseX = 0;
let mouseY = 0;

let mouseInside = false;

window.addEventListener("mousemove", e => {

    mouseInside = true;

    mouseX =
        (e.clientX / window.innerWidth) - 0.5;

    mouseY =
        (e.clientY / window.innerHeight) - 0.5;

    mouseNDC.x =
        (e.clientX / window.innerWidth) * 2 - 1;

    mouseNDC.y =
        -(e.clientY / window.innerHeight) * 2 + 1;

    /*
       Convert mouse screen position into Three.js world position
       on approximately the z=0 plane.
    */

    const vector =
        new THREE.Vector3(
            mouseNDC.x,
            mouseNDC.y,
            0.5
        );

    vector.unproject(camera);

    const dir =
        vector.sub(camera.position).normalize();

    const distance =
        -camera.position.z / dir.z;

    mouseWorld.copy(
        camera.position
    ).add(
        dir.multiplyScalar(distance)
    );
});

window.addEventListener("mouseleave", () => {
    mouseInside = false;
});

/* ============================================================
   ANIMATION LOOP
   ============================================================ */

function animate() {

    requestAnimationFrame(
        animate
    );

    const time =
        performance.now() * 0.001;

    const pos =
        geometry.attributes.position.array;

    const alphaAttr =
        geometry.attributes.alpha.array;

    for (let i = 0; i < particleCount; i++) {

        const i3 = i * 3;

        const ox =
            originalPositions[i3];

        const oy =
            originalPositions[i3 + 1];

        const oz =
            originalPositions[i3 + 2];

        /*
           Slow organic floating movement.
           The particle always wants to return to its original shape.
        */

        let finalX =
            ox +
            Math.sin(
                time * FLOAT_SPEED +
                i * 0.013
            ) * FLOAT_AMOUNT_XY;

        let finalY =
            oy +
            Math.cos(
                time * FLOAT_SPEED +
                i * 0.017
            ) * FLOAT_AMOUNT_XY;

        let finalZ =
            oz +
            Math.sin(
                time * FLOAT_SPEED * 1.25 +
                i * 0.019
            ) * FLOAT_AMOUNT_Z;

        /*
           Mouse repulsion.
           Larger radius creates the bigger dispersion bubble.
        */

        if (mouseInside) {

            const dx =
                finalX - mouseWorld.x;

            const dy =
                finalY - mouseWorld.y;

            const distance =
                Math.sqrt(
                    dx * dx +
                    dy * dy
                );

            if (distance < CURSOR_RADIUS) {

                const influence =
                    1 -
                    distance / CURSOR_RADIUS;

                /*
                   Squared influence creates a smoother falloff:
                   strong near cursor, gentle near edge.
                */

                const force =
                    influence *
                    influence;

                const nx =
                    dx / (distance || 1);

                const ny =
                    dy / (distance || 1);

                finalX +=
                    nx *
                    CURSOR_REPEL_STRENGTH *
                    force;

                finalY +=
                    ny *
                    CURSOR_REPEL_STRENGTH *
                    force;

                finalZ +=
                    CURSOR_Z_LIFT *
                    force;
            }
        }

        pos[i3] =
            finalX;

        pos[i3 + 1] =
            finalY;

        pos[i3 + 2] =
            finalZ;

        /*
           Keep particles visible.
           Tiny shimmer only.
        */

        alphaAttr[i] =
            0.92 +
            Math.sin(
                time * 2.0 +
                i * 0.07
            ) * 0.08;
    }

    geometry.attributes.position.needsUpdate =
        true;

    geometry.attributes.alpha.needsUpdate =
        true;

    /*
       Tiny whole-object nudge away from cursor.
       Only a couple pixels.
    */

    const targetObjectX =
        mouseInside
            ? -mouseX * OBJECT_AVOID_STRENGTH
            : 0;

    const targetObjectY =
        mouseInside
            ? mouseY * OBJECT_AVOID_STRENGTH
            : 0;

    particles.position.x +=
        (targetObjectX - particles.position.x) * 0.08;

    particles.position.y +=
        (targetObjectY - particles.position.y) * 0.08;

    /*
       Very subtle parallax.
    */

    const targetRotationY =
        mouseInside
            ? mouseX * ROTATION_STRENGTH_Y
            : 0;

    const targetRotationX =
        mouseInside
            ? -mouseY * ROTATION_STRENGTH_X
            : 0;

    particles.rotation.y +=
        (targetRotationY - particles.rotation.y) * 0.04;

    particles.rotation.x +=
        (targetRotationX - particles.rotation.x) * 0.04;

    particles.rotation.z =
        Math.sin(time * 0.08) * 0.006;

    renderer.render(
        scene,
        camera
    );
}

animate();

/* ============================================================
   RESIZE HANDLER
   ============================================================ */

window.addEventListener("resize", () => {

    camera.aspect =
        window.innerWidth /
        window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
});

</script>

</body>
</html>
